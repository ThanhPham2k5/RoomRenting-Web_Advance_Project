<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/pages/homepage.css" />

    <link
      rel="icon"
      type="image/png"
      href="../assets/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="../assets/favicon/favicon.svg"
    />
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="../assets/favicon/site.webmanifest" />
    <title>Home Page | RoomRenting</title>
  </head>
  <body>
    <div class="header">
      <a class="header-logo" href="./index.html">
        <img
          src="../assets/img/logo.png"
          alt="logo.png"
          class="header-logo-img"
        />

        <h2 class="header-logo-text">RoomRenting.com</h2>
      </a>

      <div class="header-buttons">
        <button class="header-button button-sign-up">Đăng ký</button>

        <button class="header-button button-log-in">Đăng nhập</button>
      </div>
    </div>

    <div class="hero">
      <div class="hero-content">
        <div class="content-title">
          <h1 class="title-main">
            Tìm nơi để<br />Sống trọn giấc mơ của bạn<br />Một cách dễ dàng tại
            đây
          </h1>

          <div class="line"></div>

          <h3 class="title-sub">
            Tất cả những gì bạn cần để tìm chỗ ở đều có ở<br />
            đây, giúp bạn dễ dàng hơn trong việc tìm kiếm
          </h3>
        </div>

        <div class="content-search">
          <div class="search-tool">
            <a href="./index.html" class="search-ico">
              <img src="../assets/img/Find.png" alt="find.png" />
            </a>

            <input
              type="text"
              name=""
              id=""
              placeholder="Tìm kiếm"
              class="search-bar"
            />
          </div>

          <div class="search-seperate"></div>

          <div class="other-tools">
            <div class="filter-tool">
              <img
                src="../assets/img/Vector.png"
                alt="filter.png"
                class="filter-ico"
              />

              <div class="filter-text">Bộ lọc</div>
            </div>

            <button class="search-submit">Tìm phòng</button>
          </div>
        </div>
      </div>

      <img src="" alt="" class="hero-img" />
    </div>
  </body>
</html>
